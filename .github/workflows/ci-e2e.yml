name: CI E2E

on:
  pull_request:
    branches: [main]
    paths:
      - 'e2e/**'
      - 'frontend/**'
      - 'backend/**'
      - 'database/**'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
      - 'docker-compose.yml'
      - '.github/workflows/ci-e2e.yml'
  push:
    branches: [main]
    paths:
      - 'e2e/**'
      - 'frontend/**'
      - 'backend/**'
      - 'database/**'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: dude_course
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -proot"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm --filter e2e exec playwright install --with-deps chromium

      - name: Generate Prisma client
        run: pnpm --filter database db:generate

      - name: Run database migrations
        run: pnpm --filter database db:migrate:deploy
        env:
          DATABASE_URL: mysql://root:root@127.0.0.1:3306/dude_course

      - name: Seed database
        run: pnpm --filter database db:seed
        env:
          DATABASE_URL: mysql://root:root@127.0.0.1:3306/dude_course

      - name: Build frontend
        run: pnpm --filter frontend build

      - name: Run E2E tests
        run: pnpm --filter e2e test
        env:
          DATABASE_URL: mysql://root:root@127.0.0.1:3306/dude_course
          JWT_SECRET: e2e-test-secret-key-at-least-32-chars-long
          NODE_ENV: test
          PORT: 3001
          CORS_ORIGIN: http://localhost:3000
          E2E_BASE_URL: http://localhost:3000
          E2E_API_URL: http://localhost:3001/api/v1

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: e2e/playwright-report/
          retention-days: 14
