name: Deploy — Database

on:
  push:
    branches: [main]
    paths:
      - 'database/prisma/migrations/**'
      - 'database/prisma/schema.prisma'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
      - 'docker-compose.yml'
      - '.github/workflows/**'

jobs:
  deploy-database-hml:
    name: Deploy Database — HML
    runs-on: ubuntu-latest
    environment: hml

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma Client
        run: pnpm --filter database db:generate
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Apply database migrations (HML)
        run: pnpm --filter database db:migrate:deploy
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

  deploy-database-prod:
    name: Deploy Database — Production
    runs-on: ubuntu-latest
    environment: prod
    needs: [deploy-database-hml]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma Client
        run: pnpm --filter database db:generate
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Apply database migrations (Production)
        run: pnpm --filter database db:migrate:deploy
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
