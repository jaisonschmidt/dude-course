name: Deploy — Backend

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - 'database/**'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
      - 'docker-compose.yml'
      - '.github/workflows/**'

jobs:
  deploy-backend-hml:
    name: Deploy Backend — HML
    runs-on: ubuntu-latest
    environment: hml

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma Client
        run: pnpm --filter database db:generate
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      # TODO: add application deploy step (e.g. Railway, Render, Fly.io, AWS)
      - name: Deploy application (HML)
        run: echo "Add application deploy command here"
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          CORS_ORIGIN: ${{ secrets.CORS_ORIGIN }}

  deploy-backend-prod:
    name: Deploy Backend — Production
    runs-on: ubuntu-latest
    environment: prod
    needs: [deploy-backend-hml]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma Client
        run: pnpm --filter database db:generate
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      # TODO: add application deploy step
      - name: Deploy application (Production)
        run: echo "Add application deploy command here"
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          CORS_ORIGIN: ${{ secrets.CORS_ORIGIN }}
