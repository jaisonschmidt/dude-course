name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  ci:
    name: Test & Lint
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: dude_course_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -proot"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    env:
      DATABASE_URL: mysql://root:root@127.0.0.1:3306/dude_course_test
      BACKEND_URL: http://localhost:3001

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma Client
        run: pnpm --filter database db:generate

      - name: Run database migrations
        run: pnpm --filter database db:migrate:deploy

      - name: Run unit tests
        run: pnpm --filter backend test

      - name: Build backend
        run: pnpm --filter backend build

      - name: Start backend
        run: pnpm --filter backend start &
        env:
          JWT_SECRET: ci-test-jwt-secret-at-least-32-characters-long
          NODE_ENV: test

      - name: Wait for backend to be ready
        run: |
          for i in $(seq 1 30); do
            if curl -sf "${BACKEND_URL}/health" > /dev/null 2>&1; then
              echo "Backend ready after ${i} attempt(s)"
              break
            fi
            if [ "$i" -eq 30 ]; then
              echo "Backend failed to start in time"
              exit 1
            fi
            sleep 2
          done

      - name: Run integration tests
        run: pnpm --filter integration-tests test
        env:
          RUN_INTEGRATION_TESTS: 'true'

      - name: Lint
        run: pnpm lint
